<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Receipt Box - DeductEats</title>
  <link rel="stylesheet" href="styles.css">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <!-- idb library -->
  <script src="https://unpkg.com/idb@7.1.1/build/umd.js"></script>
</head>
<body>

  <nav id="top-nav">
    <div class="nav-logo">DeductEats</div>
    <div class="nav-links">
      <a href="welcome.html" class="nav-btn">Welcome</a>
      <a href="home.html" class="nav-btn">Home</a>
      <a href="history.html" class="nav-btn active">Receipt Box</a>
      <a href="learn.html" class="nav-btn">Learn</a>
      <a href="settings.html" class="nav-btn">Settings</a>
      <button id="logout-btn">Log Out</button>
    </div>
    <button class="hamburger" id="hamburger-btn">≡</button>
  </nav>

  <main id="main-content">
    <div class="hero">
      <h1>Receipt Box</h1>
      <p>View and manage your saved receipts. Click the + or 📷 icon to add or view photos.</p>
    </div>

    <div id="log-list"></div>

    <button id="export-csv" class="primary">Export All to CSV</button>

    <!-- Photo Viewer Modal -->
    <div id="photo-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:200; align-items:center; justify-content:center;">
      <div style="background:white; border-radius:12px; padding:16px; width:90%; max-width:600px; max-height:85%; overflow-y:auto; position:relative;">
        <button onclick="document.getElementById('photo-modal').style.display='none';" style="position:absolute; top:8px; right:16px; background:none; border:none; font-size:2.5rem; cursor:pointer; color:#333;">×</button>
        <h3>Receipt Photos</h3>
        <div id="photo-gallery" style="display:flex; flex-wrap:wrap; gap:16px; justify-content:center;"></div>
      </div>
    </div>

    <!-- Report Modal (existing) -->
    <section id="report-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:200; align-items:center; justify-content:center;">
      <div style="background:white; border-radius:12px; padding:24px; width:90%; max-width:500px; max-height:80%; overflow-y:auto; box-shadow:0 4px 20px rgba(0,0,0,0.3);">
        <h3 id="report-title"></h3>
        <div id="report-items" style="margin-bottom:16px;"></div>
        <div id="report-total" style="margin-top:16px; font-weight:bold; text-align:right; padding-top:12px; border-top:2px solid #eee;"></div>
        <button id="close-report" class="secondary" style="margin-top:24px; width:100%;">Back to List</button>
      </div>
    </section>
  </main>

  <footer id="social-footer">
    <div class="social-icons">
      <a href="#" title="Follow on X" class="social-link">𝕏</a>
      <a href="#" title="Follow on Instagram" class="social-link">📸</a>
      <a href="#" title="Follow on Facebook" class="social-link">f</a>
    </div>
    <small>© 2026 DeductEats • Saint George, Utah</small>
  </footer>

  <script src="script.js"></script>

  <!-- Hamburger menu toggle -->
  <script>
    const hamburgerBtn = document.getElementById('hamburger-btn');
    const navLinks = document.querySelector('.nav-links');

    if (hamburgerBtn && navLinks) {
      hamburgerBtn.addEventListener('click', () => {
        navLinks.classList.toggle('active');
      });
    }
  </script>

  <!-- Hidden camera input -->
  <input type="file" id="hidden-camera-input" accept="image/*" capture="environment" style="display:none;">
</body>
</html>
